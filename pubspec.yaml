name: diagnorax_ai
description: DiagnoraX AI - Next-Generation Intelligent Diagnosis Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  google_sign_in: ^6.2.2

  # HTTP & API
  http: ^1.2.2
  dio: ^5.7.0

  # Image Picking
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1
  percent_indicator: ^4.2.3
  fl_chart: ^0.68.0

  # State & Utils
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  uuid: ^4.5.1
  flutter_markdown: ^0.7.3+1

  # Notifications
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4

  # Misc
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1
  share_plus: ^10.0.3
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
